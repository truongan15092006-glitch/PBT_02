<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký tài khoản</title>
  </head>
  <body>
    <h1>Đăng ký tài khoản E-Commerce</h1>

    <form action="#" method="POST">
      <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label for="fullname">Họ tên:</label>
        <input
          type="text"
          id="fullname"
          name="fullname"
          placeholder="Nhập họ tên"
          required
          minlength="2"
          maxlength="50"
        /><br /><br />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@gmail.com"
          required
        /><br /><br />

        <label for="phone">Số điện thoại:</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="0123456789"
          pattern="[0-9]{10}"
        /><br /><br />

        <label for="dob">Ngày sinh:</label>

        <input
          type="date"
          id="dob"
          name="dob"
          placeholder="Chọn ngày sinh"
          max="2026-04-28"
        /><br /><br />
      </fieldset>

      <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="abc_123"
          pattern="^[a-zA-Z0-9_]{3,20}$"
        /><br /><br />

        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ít nhất 8 ký tự"
          minlength="8"
          pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$"
        /><br /><br />

        <label for="confirm">Xác nhận password:</label>
        <input
          type="password"
          id="confirm"
          name="confirm"
          placeholder="Nhập lại password"
          minlength="8"
          pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$"
        /><br /><br />
      </fieldset>

      <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố:</label>
        <select id="city" name="city">
          <option value="">--Chọn thành phố--</option>
          <option>Hà Nội</option>
          <option>Hồ Chí Minh</option>
          <option>Đà Nẵng</option>
          <option>Hải Phòng</option>
          <option>Cần Thơ</option></select
        ><br /><br />

        <label for="district">Quận/Huyện:</label>
        <select id="district" name="district">
          <option value="">--Chọn quận/huyện--</option>
          <option>Quận 1</option>
          <option>Quận 2</option>
          <option>Quận 3</option>
          <option>Ba Đình</option>
          <option>Cầu Giấy</option></select
        ><br /><br />

        <label for="address">Địa chỉ chi tiết:</label>
        <textarea
          id="address"
          name="address"
          placeholder="Nhập địa chỉ cụ thể"
          rows="3"
        ></textarea
        ><br /><br />

        <span>Giới tính:</span><br />
        <input type="radio" id="male" name="gender" value="male" />
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender" value="female" />
        <label for="female">Nữ</label>

        <input type="radio" id="other" name="gender" value="other" />
        <label for="other">Khác</label><br /><br />

        <input type="checkbox" id="terms" name="terms" required />
        <label for="terms">Tôi đồng ý với điều khoản</label><br /><br />
      </fieldset>

      <button type="submit">Đăng ký</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
